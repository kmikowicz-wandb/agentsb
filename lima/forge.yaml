base:
  - ./base.yaml

# forge (https://forgecode.dev) installs via a curl-piped script. This
# pulls a binary into ~/.local/bin for the default VM user, which is
# already on PATH in Ubuntu's default login shell.
provision:
  - mode: user
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      curl -fsSL https://forgecode.dev/cli | sh
      # Ensure forge is on PATH for non-login shells too.
      grep -q '.local/bin' "$HOME/.bashrc" || \
        echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"

message: |
  forge VM ready. Use:
    agentsb forge                  # interactive
    agentsb --shell forge          # VM shell
