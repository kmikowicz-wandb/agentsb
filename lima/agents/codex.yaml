# Provision fragment: install OpenAI Codex.
# Not standalone; composed into lima/agentsb.yaml via `base:`.
provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      npm install -g @openai/codex

# Flags injected when agentsb is invoked with --auto.
auto:
  flags:
    - --approval-mode
    - full-auto
