base:
  - ./base.yaml

provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      npm install -g @openai/codex

message: |
  codex VM ready. Use:
    agentsb codex                  # interactive
    agentsb codex -p "…"           # one-shot
    agentsb --shell codex          # VM shell
