# agentsb — Lima VM egress firewall
#
# Loaded on the macOS host via `pfctl` (see `agentsb --setup-host`).
# Traffic is filtered on bridge100, Lima's socket_vmnet bridge, BEFORE it
# reaches the host's NAT — so nothing inside the VM can modify these rules.
#
# Subnet 192.168.105.0/24 is Lima's default for the "shared" socket_vmnet
# network. The gateway (host) is 192.168.105.1.
#
# Direction: `in on bridge100` captures packets arriving from the VM side
# of the bridge. `keep state` allows the return path automatically.

table <agentsb_vms> { 192.168.105.0/24 }

# Within-subnet traffic (VM ↔ host gateway) — required for limactl shell.
pass in quick on bridge100 from <agentsb_vms> to <agentsb_vms>

# DNS — both UDP and TCP, to any resolver.
pass in quick on bridge100 proto { tcp udp } from <agentsb_vms> to any port 53 keep state

# HTTP, HTTPS, git+SSH.
pass in quick on bridge100 proto tcp from <agentsb_vms> to any port { 80, 443, 22 } keep state

# Drop everything else from Lima VMs.
block drop in quick on bridge100 from <agentsb_vms>
