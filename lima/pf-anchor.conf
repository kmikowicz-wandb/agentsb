# agentsb — Lima VM egress firewall
#
# Loaded on the macOS host via `pfctl` (see `agentsb --setup-host`).
# Traffic is filtered BEFORE the host's NAT — so nothing inside the VM
# can modify or bypass these rules regardless of in-guest privileges.
#
# Subnet 192.168.64.0/24 is Apple's vmnet shared subnet, used by Lima's
# vzNAT network driver. The gateway (host) is 192.168.64.1. We match by
# source subnet rather than by bridge interface because vzNAT does not
# give the host-side bridge a stable name (bridge100, bridge101, …
# depending on what else is running).
#
# `keep state` allows the return path automatically.

table <agentsb_vms> { 192.168.64.0/24 }

# Within-subnet traffic (VM ↔ host gateway) — required for limactl shell.
pass in quick from <agentsb_vms> to <agentsb_vms>

# DNS — both UDP and TCP, to any resolver.
pass in quick proto { tcp udp } from <agentsb_vms> to any port 53 keep state

# HTTP, HTTPS, git+SSH.
pass in quick proto tcp from <agentsb_vms> to any port { 80, 443, 22 } keep state

# Drop everything else from Lima VMs.
block drop in quick from <agentsb_vms>
