base:
  - ./base.yaml

# aider runs via uvx to avoid a persistent virtualenv. Cache is pre-warmed
# during provision so the first interactive run doesn't pay download latency.
provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      cat >/usr/local/bin/aider <<'EOF'
      #!/bin/sh
      exec uvx --from aider-chat aider "$@"
      EOF
      chmod +x /usr/local/bin/aider

  - mode: user
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      # Warm the uvx cache for aider-chat so first run is instant.
      uvx --from aider-chat aider --version >/dev/null

message: |
  aider VM ready. Use:
    agentsb aider FILE…            # aider with files in /workspace
    agentsb --shell aider          # VM shell
