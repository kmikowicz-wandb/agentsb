base:
  - ./base.yaml

provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      npm install -g @anthropic-ai/claude-code

message: |
  claude VM ready. Use:
    agentsb claude                 # interactive
    agentsb claude -p "…"          # one-shot
    agentsb --shell claude         # VM shell
